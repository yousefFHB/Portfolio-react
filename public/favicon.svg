<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1F3A"/> <!-- navy blue -->
      <stop offset="100%" stop-color="#1A1A40"/> <!-- dark indigo -->
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#grad)"/>

  <!-- Code brackets -->
  <path d="M26 20 L18 32 L26 44" 
        fill="none" 
        stroke="#A5B4FC" 
        stroke-width="3" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>

  <path d="M38 20 L46 32 L38 44" 
        fill="none" 
        stroke="#6366F1" 
        stroke-width="3" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>

  <!-- Slash -->
  <line x1="30" y1="44" x2="34" y2="20"
        stroke="#E0E7FF"
        stroke-width="2.5"
        stroke-linecap="round"/>
</svg>